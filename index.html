<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Lucas | Estudante ADS</title>
    <style>
        /* Variáveis de Cores e Tipografia */
        :root {
            --bg-primary: #0a0f18;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --accent-primary: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --transition: all 0.3s ease;
        }

        /* Resets Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Seção Hero (Apresentação Principal) */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 80px 0 60px;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: 3px solid var(--accent-primary);
            margin-bottom: 24px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .hero h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .hero h2 {
            font-size: 1.25rem;
            color: var(--accent-primary);
            font-weight: 500;
            margin-bottom: 24px;
        }

        .hero p {
            max-width: 600px;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 32px;
        }

        /* Botões de Ação */
        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background-color: var(--text-main);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Seções Genéricas */
        section {
            padding: 60px 0;
            border-bottom: 1px solid var(--border-color);
        }

        section h3 {
            font-size: 1.75rem;
            margin-bottom: 30px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        section h3::before {
            content: '';
            display: block;
            width: 8px;
            height: 24px;
            background-color: var(--accent-primary);
            border-radius: 4px;
        }

        /* Seção Currículo / Histórico */
        .resume-timeline {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timeline-item {
            background-color: var(--bg-secondary);
            padding: 24px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-primary);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .timeline-company {
            color: var(--accent-primary);
            font-weight: 500;
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: var(--bg-card);
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* Seção Projetos (Grid) */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background-color: var(--bg-card);
            color: var(--accent-primary);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
